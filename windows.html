<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windows - Aluminium Works</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

body { background: #111; }

/* Slider */
.slider {
    position: fixed;
    width: 100%;
    height: 100vh;
    z-index: -1;
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 1s ease-in-out;
}

.slide.active { opacity: 1; }

/* Overlay Text */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    color: #fff;
    background: rgba(0,0,0,0.4);
}

.hero h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

.hero p {
    font-size: 18px;
    margin-bottom: 20px;
}

.hero button {
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: #00c853;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
}

/* Header */
header {
    position: fixed;
    width: 100%;
    top: 0;
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.15);
    border-bottom: 1px solid rgba(255,255,255,0.3);
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
    color: #fff;
}

.logo { font-size: 20px; font-weight: bold; }

nav ul { display: flex; list-style: none; }
nav ul li { margin: 0 15px; cursor: pointer; }

.menu-toggle { display: none; font-size: 24px; cursor: pointer; }

@media(max-width:768px){
    nav ul { display:none; flex-direction:column; position:absolute; top:60px; right:10px; background:rgba(255,255,255,0.2); padding:10px; border-radius:10px; }
    nav ul.active { display:flex; }
    .menu-toggle { display:block; }
}

/* Cards */
.container {
    padding: 40px 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
}

.card {
    height: 250px;
    border-radius: 15px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
}

.card img { width:100%; height:100%; object-fit:cover; }

.card h3 {
    position:absolute;
    bottom:0;
    width:100%;
    color:#fff;
    background:rgba(0,0,0,0.6);
    text-align:center;
    padding:10px;
}

/* WhatsApp Button */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: #fff;
    padding: 15px 18px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    z-index: 1000;
}
/* NAV LINKS */
.nav {
    display: flex;
    gap: 20px;
}

.nav a {
    text-decoration: none;
    color: #fff;
    font-weight: 500;
}

/* CONFIG BUTTON (PROFESSIONAL CTA) */
.config-btn {
    margin-left: auto;
    padding: 10px 20px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
    color: #fff;
    background: linear-gradient(135deg, #00c853, #00e676);
    box-shadow: 0 4px 15px rgba(0,200,83,0.4);
    transition: all 0.3s ease;
    display: inline-block;
}

/* HOVER EFFECT */
.config-btn:hover {
    transform: translateY(-2px) scale(1.05);
    box-shadow: 0 8px 20px rgba(0,200,83,0.6);
}

/* CLICK EFFECT */
.config-btn:active {
    transform: scale(0.95);
}

/* RESPONSIVE */
@media(max-width:768px){
    header {
        flex-wrap: wrap;
    }

    .config-btn {
        margin-top: 10px;
        width: 100%;
        text-align: center;
    }
}
</style>
</head>
<body>
<!-- Slider -->
<div class="slider">
    <div class="slide active" style="background-image:url('images/slide-1.jfif');"></div>
    <div class="slide" style="background-image:url('images/slide-2.jfif');"></div>
    <div class="slide" style="background-image:url('images/slide-3.jfif');"></div>
</div>

<header>
    <div><b>Windows Collection</b></div>

    <nav class="nav">
        <a href="index.html">Home</a>
        <a href="windows.html">Windows</a>
    </nav>

    <a href="windows-configuration.html" class="config-btn">
        Windows Configuration
    </a>
</header>

<div class="container">
    <div class="card">
        <img src="images/modern-window.jfif" />
        <h3>Modern Windows</h3>
    </div>

    <div class="card">
        <img src="images/office-window.jfif" />
        <h3>Office Windows</h3>
    </div>

    <div class="card">
        <img src="images/sliding-window.jfif" />
        <h3>Sliding Windows</h3>
    </div>
</div>

</body>
</html>
