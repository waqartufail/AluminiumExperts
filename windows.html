<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windows - Aluminium Works</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{
    background: linear-gradient(135deg,#bfc9d1,#e6ebef);
}

header{
    position:fixed;
    width:100%;
    top:0;
    padding:15px 20px;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:#000;
    z-index:1000;
}

header a{
    text-decoration:none;
    color:#000;
    font-weight:bold;
    margin-left:15px;
}

.config-btn{
    padding:8px 14px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    background:#00c853;
    color:#fff;
    font-weight:bold;
    margin-left:10px;
}

.container{
    margin-top:90px;
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    height:250px;
    border-radius:15px;
    overflow:hidden;
    position:relative;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.card h3{
    position:absolute;
    bottom:0;
    width:100%;
    background:rgba(0,0,0,0.6);
    color:#fff;
    text-align:center;
    padding:10px;
}
</style>
</head>
<body>

<header>
    <div><b>Windows Collection</b></div>

    <nav class="nav">
        <a href="index.html">Home</a>
        <a href="windows.html">Windows</a>
    </nav>

    <a href="windows-configuration.html" class="config-btn">
        Windows Configuration
    </a>
</header>

<div class="container">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1598928506311-c55ded91a20c" />
        <h3>Modern Windows</h3>
    </div>

    <div class="card">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRe9qSG9_r9b5V7E1InlfxDAcjhBaE4wX5XmA&s" />
        <h3>Office Windows</h3>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1501183638710-841dd1904471" />
        <h3>Sliding Windows</h3>
    </div>
</div>

</body>
</html>
