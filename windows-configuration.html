<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<title>Professional Calclulator</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

body { background: #111; }

/* Slider */
.slider {
    position: fixed;
    width: 100%;
    height: 100vh;
    z-index: -1;<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 1s ease-in-out;
}

.slide.active { opacity: 1; }

/* Overlay Text */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    color: #fff;
    background: rgba(0,0,0,0.4);
}

.hero h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

.hero p {
    font-size: 18px;
    margin-bottom: 20px;
}

.hero button {
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: #00c853;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
}

/* Header */
header {
    position: fixed;
    width: 100%;
    top: 0;
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.15);
    border-bottom: 1px solid rgba(255,255,255,0.3);
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
    color: #fff;
}

.logo { font-size: 20px; font-weight: bold; }

nav ul { display: flex; list-style: none; }
nav ul li { margin: 0 15px; cursor: pointer; }

.menu-toggle { display: none; font-size: 24px; cursor: pointer; }

@media(max-width:768px){
    nav ul { display:none; flex-direction:column; position:absolute; top:60px; right:10px; background:rgba(255,255,255,0.2); padding:10px; border-radius:10px; }
    nav ul.active { display:flex; }
    .menu-toggle { display:block; }
}

/* Cards */
.container {
    padding: 40px 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
}

.card {
    height: 250px;
    border-radius: 15px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
}

.card img { width:100%; height:100%; object-fit:cover; }

.card h3 {
    position:absolute;
    bottom:0;
    width:100%;
    color:#fff;
    background:rgba(0,0,0,0.6);
    text-align:center;
    padding:10px;
}

/* WhatsApp Button */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: #fff;
    padding: 15px 18px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    z-index: 1000;
}
/* NAV LINKS */
.nav {
    display: flex;
    gap: 20px;
}

.nav a {
    text-decoration: none;
    color: #fff;
    font-weight: 500;
}

/* CONFIG BUTTON (PROFESSIONAL CTA) */
.config-btn {
    margin-left: auto;
    padding: 10px 20px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
    color: #fff;
    background: linear-gradient(135deg, #00c853, #00e676);
    box-shadow: 0 4px 15px rgba(0,200,83,0.4);
    transition: all 0.3s ease;
    display: inline-block;
}

/* HOVER EFFECT */
.config-btn:hover {
    transform: translateY(-2px) scale(1.05);
    box-shadow: 0 8px 20px rgba(0,200,83,0.6);
}

/* CLICK EFFECT */
.config-btn:active {
    transform: scale(0.95);
}

/* RESPONSIVE */
@media(max-width:768px){
    header {
        flex-wrap: wrap;
    }

    .config-btn {
        margin-top: 10px;
        width: 100%;
        text-align: center;
    }
}
/* BASE */
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
}

/* HEADER (GLASS STYLE) */
header {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  padding:14px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* LAYOUT */
.container {
  display:grid;
  grid-template-columns: 1fr 1.4fr 1fr;
  gap:15px;
  padding:15px;
}

/* PANEL (GLASS CARD) */
.panel {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding:15px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.08);
  box-shadow: 0 8px 25px rgba(0,0,0,0.4);
  transition: 0.3s;
}

.panel:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 30px rgba(0,0,0,0.6);
}

/* LABELS */
label {
  font-size:12px;
  color:#94a3b8;
  display:block;
  margin-top:10px;
}

/* INPUTS (MODERN) */
input, select {
  width:100%;
  padding:8px;
  margin-top:5px;
  background: rgba(15,23,42,0.8);
  color:white;
  border:1px solid rgba(148,163,184,0.3);
  border-radius:8px;
  outline:none;
  transition:0.3s;
}

/* INPUT FOCUS EFFECT */
input:focus, select:focus {
  border-color:#00c853;
  box-shadow: 0 0 8px rgba(0,200,83,0.5);
}

/* CANVAS PANEL */
canvas {
  width:100%;
  height:520px;
  background: linear-gradient(135deg,#cbd5f5,#e2e8f0);
  border-radius:14px;
  box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
}

/* OPTIONAL BUTTON STYLE (MATCHING YOUR CTA) */
button {
  margin-top:15px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:25px;
  background: linear-gradient(135deg,#00c853,#00e676);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 8px 20px rgba(0,200,83,0.6);
}
/* ACTION BUTTON CONTAINER */
.action-buttons {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* BASE BUTTON */
.btn {
  padding: 12px;
  border: none;
  border-radius: 25px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.3s ease;
  color: white;
}

/* PRIMARY (ADD TO CART) */
.btn.primary {
  background: linear-gradient(135deg, #00c853, #00e676);
  box-shadow: 0 4px 15px rgba(0,200,83,0.4);
}

.btn.primary:hover {
  transform: translateY(-2px) scale(1.03);
  box-shadow: 0 8px 20px rgba(0,200,83,0.6);
}

/* SECONDARY (QUOTE) */
.btn.secondary {
  background: linear-gradient(135deg, #2962ff, #448aff);
  box-shadow: 0 4px 15px rgba(41,98,255,0.4);
}

.btn.secondary:hover {
  transform: translateY(-2px) scale(1.03);
  box-shadow: 0 8px 20px rgba(41,98,255,0.6);
}

/* DANGER (BOOK ORDER) */
.btn.danger {
  background: linear-gradient(135deg, #d50000, #ff5252);
  box-shadow: 0 4px 15px rgba(213,0,0,0.4);
}

.btn.danger:hover {
  transform: translateY(-2px) scale(1.03);
  box-shadow: 0 8px 20px rgba(213,0,0,0.6);
}

/* CLICK EFFECT */
.btn:active {
  transform: scale(0.95);
}
.cost-wrapper{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.cost-card{
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(10px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:14px;
  padding:12px 14px;
  box-shadow:0 6px 18px rgba(0,0,0,0.3);
  transition:0.3s;
}

.cost-card:hover{
  transform:translateY(-2px);
}

.cost-title{
  font-size:13px;
  color:#94a3b8;
  margin-bottom:6px;
}

.cost-value{
  font-size:16px;
  font-weight:bold;
  color:#fff;
}

.grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.total-card{
  background: linear-gradient(135deg,#00c853,#00e676);
  color:white;
  padding:15px;
  border-radius:14px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
  box-shadow:0 10px 25px rgba(0,200,83,0.4);
}
</style>
</head>

<body>

<header>🏗 Aluminium Size Pricing</header>

<div class="container">

<!-- INPUT -->
<div class="panel">

<h3>Inputs</h3>

<label>Quantity</label>
<input id="qty" type="number" value="1" min="1">

<label>Width (cm)</label>
<input id="w" value="1">

<label>Height (cm)</label>
<input id="h" value="1">

<label>Window Type</label>
<select id="type">
  <option value="Sliding">Sliding</option>
  <option value="Casement">Casement</option>
  <option value="Fixed">Fixed</option>
  <option value="TopHung">Top Hung</option>
</select>

<label>Profile</label>
<select id="profile">
  <option value="70">70mm</option>
  <option value="80">80mm</option>
  <option value="100">100mm</option>
</select>

<label>Glass</label>
<select id="glass">
  <option value="6">6mm</option>
  <option value="8">8mm</option>
  <option value="10">10mm</option>
</select>

<label>Finish</label>
<select id="finish">
  <option value="white">White</option>
  <option value="black">Black</option>
  <option value="wood">Wood</option>
</select>

<label>Hardware</label>
<select id="hardware">
  <option value="standard">Standard</option>
  <option value="premium">Premium</option>
  <option value="multi">Multi</option>
</select>

</div>

<!-- CAD -->
<div class="panel">
<h3>CAD Preview</h3>
<canvas id="cad"></canvas>
</div>

<!-- COST -->
<!-- COST -->
<div class="panel">
  <h3>Cost</h3>

  <div id="cost"></div>

  <div class="action-buttons">
    <button class="btn primary">🛒 Add to Cart</button>
    <button onclick="generateQuote()" class="btn secondary">📄 Generate Quote</button>
    <button class="btn danger">📅 Book Order</button>
  </div>
</div>

</div>

<script>

const canvas = document.getElementById("cad");
const ctx = canvas.getContext("2d");

let rates = {
  aluminium: {70:700,80:800,100:850},
  glass: {6:1200,8:1500,10:1800},
  finishMultiplier: {white:1,black:1.1,wood:1.3},
  hardware: {standard:500,premium:1500,multi:2000},
  labour: 1500
};

function resize(){
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
}
window.addEventListener("resize", ()=>{resize(); draw();});
resize();

function drawCAD(w,h,type){

  const scale = Math.min(canvas.width/w, canvas.height/h)*0.8;

  const W = w*scale;
  const H = h*scale;

  const x = (canvas.width-W)/2;
  const y = (canvas.height-H)/2;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // glass
  ctx.fillStyle="#cfe8ff";
  ctx.fillRect(x,y,W,H);

  // frame
  ctx.strokeStyle="#1f4e79";
  ctx.lineWidth=5;
  ctx.strokeRect(x,y,W,H);

  ctx.strokeStyle="#333";
  ctx.lineWidth=2;

  // 🪟 WINDOW TYPE LOGIC
  if(type==="Sliding"){
    ctx.beginPath();
    ctx.moveTo(x+W/2,y);
    ctx.lineTo(x+W/2,y+H);
    ctx.stroke();
  }

  if(type==="Casement"){
    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.lineTo(x+W,y+H);
    ctx.stroke();
  }

  if(type==="TopHung"){
    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.lineTo(x+W,y);
    ctx.stroke();
  }

  // Fixed → no partition
}

function costEngine(w, h){

  const profile = document.getElementById("profile").value;
  const glass = document.getElementById("glass").value;
  const finish = document.getElementById("finish").value;
  const hardware = document.getElementById("hardware").value;
  const qty = +document.getElementById("qty").value || 1;

  // ✅ STEP 1: CM → FEET
  let wFt = w / 30.48;
  let hFt = h / 30.48;

  // ✅ STEP 2: AREA (SQFT)
  let area = wFt * hFt;

  // ✅ COST CALCULATION
  let aluminiumCost = area * rates.aluminium[profile];
  let glassCost = area * rates.glass[glass];
  let hardwareCost = rates.hardware[hardware];
  let labourCost = rates.labour*qty;

  // ✅ APPLY FINISH ONLY ON ALUMINIUM
  aluminiumCost *= rates.finishMultiplier[finish];

  // ✅ PER UNIT TOTAL
  let perUnit =
    aluminiumCost +
    glassCost +
    hardwareCost +
    labourCost;

  // ✅ FINAL TOTAL WITH QTY
  let total = perUnit * qty;

  return {
    widthFt: wFt,
    heightFt: hFt,
    area,
    aluminiumCost,
    glassCost,
    hardwareCost,
    labourCost,
    perUnit,
    total,
    qty
  };
}

function draw(){

  const w = +document.getElementById("w").value || 0;
  const h = +document.getElementById("h").value || 0;
  const type = document.getElementById("type").value;

  // ✅ DRAW ALWAYS WORKS
  drawCAD(w,h,type);

  try {
    let c = costEngine(w,h);

	document.getElementById("cost").innerHTML = `
<div class="cost-wrapper">

  <!-- DIMENSIONS -->
  <div class="cost-card">
    <div class="cost-title">Dimensions</div>

    <div class="grid-2">
      <div>
        <div class="cost-title">Width</div>
        <div class="cost-value">${c.widthFt.toFixed(2)} ft</div>
      </div>

      <div>
        <div class="cost-title">Height</div>
        <div class="cost-value">${c.heightFt.toFixed(2)} ft</div>
      </div>
    </div>

    <div style="margin-top:10px;">
      <div class="cost-title">Area</div>
      <div class="cost-value">${c.area.toFixed(2)} sqft</div>
    </div>
  </div>

  <!-- BREAKUP -->
  <div class="cost-card">
    <div class="cost-title">Cost Breakdown</div>

    <div class="grid-2">
      <div>
        <div class="cost-title">Aluminium</div>
        <div class="cost-value">${c.aluminiumCost.toFixed(2)}</div>
      </div>

      <div>
        <div class="cost-title">Glass</div>
        <div class="cost-value">${c.glassCost.toFixed(2)}</div>
      </div>

      <div>
        <div class="cost-title">Hardware</div>
        <div class="cost-value">${c.hardwareCost.toFixed(2)}</div>
      </div>

      <div>
        <div class="cost-title">Labour</div>
        <div class="cost-value">${c.labourCost.toFixed(2)}</div>
      </div>
    </div>
  </div>

  <!-- QTY -->
  <div class="cost-card">
    <div class="cost-title">Quantity</div>
    <div class="cost-value">${c.qty}</div>

    <div class="cost-title" style="margin-top:8px;">Per Unit</div>
    <div class="cost-value">${c.perUnit.toFixed(2)}</div>
  </div>

  <!-- TOTAL -->
  <div class="total-card">
    TOTAL: ${c.total.toFixed(2)}
  </div>

</div>
`;
  } catch (err) {
    console.error("Calculation Error:", err);
  }
}

// LIVE UPDATE
document.querySelectorAll("input,select")
.forEach(e=>{
  e.addEventListener("input", draw);
  e.addEventListener("change", draw);
});

draw();

function generateQuote(){

  const w = +document.getElementById("w").value;
  const h = +document.getElementById("h").value;

  const type = document.getElementById("type").value;
  const profile = document.getElementById("profile").value;

  const glass = document.getElementById("glass").value;
  const finish = document.getElementById("finish").value;
  const hardware = document.getElementById("hardware").value;

  const qty = +document.getElementById("qty").value || 1;

  let c = costEngine(w,h);

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let today = new Date();
  let validTill = new Date();
  validTill.setDate(today.getDate() + 2);

  // ================= HELPERS =================
  function formatAmount(num){
    return new Intl.NumberFormat('en-IN', {
      maximumFractionDigits: 0
    }).format(num);
  }

  function numberToWords(num){
    const a = ['', 'One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten',
      'Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];

    const b = ['', '', 'Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];

    if (num === 0) return 'Zero';

    if (num < 20) return a[num];

    if (num < 100) return b[Math.floor(num/10)] + ' ' + a[num%10];

    if (num < 1000)
      return a[Math.floor(num/100)] + ' Hundred ' + numberToWords(num%100);

    if (num < 100000)
      return numberToWords(Math.floor(num/1000)) + ' Thousand ' + numberToWords(num%1000);

    return num.toString();
  }

  // ================= HEADER =================
  doc.setFontSize(16);
  doc.text("STAR ALUMINIUM - QUOTATION", 14, 15);

  doc.setFontSize(10);
  doc.text(`Date: ${today.toLocaleDateString()}`, 14, 22);
  doc.text(`Valid Till: ${validTill.toLocaleDateString()}`, 14, 28);

  // ================= INTRO =================
  doc.text(
    "We are pleased to submit our quotation for the supply and installation of aluminium windows as per your requirements.",
    14,
    38
  );

  doc.text(
    "All materials will be supplied as per standard industry specifications with high-quality workmanship and finishing.",
    14,
    44
  );

  doc.text(
    "Prices are based on current market rates and are subject to change without prior notice unless confirmed.",
    14,
    50
  );

  // ================= TABLE =================
  let tableData = [
    [
      1,
      `${type} Aluminium Window (Profile ${profile}, ${finish} Finish)`,
      qty,
      `${c.widthFt.toFixed(2)} ft`,
      `${c.heightFt.toFixed(2)} ft`,
      `${glass} mm`,
      `${hardware}`
    ]
  ];

  doc.autoTable({
    startY: 58,
    head: [[
      "Sr No",
      "Item Description",
      "Qty",
      "Width",
      "Height",
      "Glass Thickness",
      "Hardware Type"
    ]],
    body: tableData,
    theme: "grid",
    styles: { fontSize: 9 }
  });

  // ================= BREAKUP =================
  let y = doc.lastAutoTable.finalY + 10;

  doc.setFontSize(12);
  doc.text("Amount Breakdown", 14, y);

  y += 8;

  doc.setFontSize(10);

  doc.text(`Aluminium Cost`, 14, y);
  doc.text(` ${formatAmount(c.aluminiumCost)}`, 120, y);

  doc.text(`Glass Cost`, 14, y + 7);
  doc.text(` ${formatAmount(c.glassCost)}`, 120, y + 7);

  doc.text(`Hardware Cost`, 14, y + 14);
  doc.text(` ${formatAmount(c.hardwareCost)}`, 120, y + 14);

  doc.text(`Labour Cost`, 14, y + 21);
  doc.text(` ${formatAmount(c.labourCost)}`, 120, y + 21);

  // ================= TOTAL =================
  let totalY = y + 35;

  doc.setFontSize(13);
  doc.text(`TOTAL AMOUNT`, 14, totalY);
  doc.text(` ${formatAmount(c.total)}`, 120, totalY);

  let words = numberToWords(Math.round(c.total)) + " Only";

drawBoldUnderlinedText(
  doc,
  words,
  14,
  totalY + 10
);

  // ================= FOOTER =================
  let footerY = totalY + 25;

  doc.setFontSize(9);
  doc.text(
    "This quotation is valid for the upcoming two days from the date of issue.",
    14,
    footerY
  );

  doc.text("Regards,", 14, footerY + 10);
  doc.text("Star Aluminium", 14, footerY + 16);

  // ================= SAVE =================
  doc.save(`Quotation_${type}.pdf`);
}

function drawBoldUnderlinedText(doc, text, x, y){

  doc.setFont("helvetica", "bold");
  doc.setFontSize(10);

  doc.text(text, x, y);

  let width = doc.getTextWidth(text);

  doc.setLineWidth(0.5);
  doc.line(x, y + 1, x + width, y + 1);
}

function formatAmount(num){
  return new Intl.NumberFormat('en-IN', {
    minimumFractionDigits: 0,
    maximumFractionDigits: 0
  }).format(num);
}

function numberToWords(num) {
  const a = [
    '', 'One', 'Two', 'Three', 'Four', 'Five', 'Six', 'Seven', 'Eight', 'Nine',
    'Ten', 'Eleven', 'Twelve', 'Thirteen', 'Fourteen', 'Fifteen',
    'Sixteen', 'Seventeen', 'Eighteen', 'Nineteen'
  ];

  const b = ['', '', 'Twenty', 'Thirty', 'Forty', 'Fifty', 'Sixty', 'Seventy', 'Eighty', 'Ninety'];

  if ((num = num.toString()).length > 9) return 'Overflow';

  let n = ('000000000' + num).substr(-9).match(/.{1,2}/g);

  let str = '';

  let numArr = n.map(Number);

  if (numArr[0]) str += (a[numArr[0]] || b[numArr[0][0]] + ' ' + a[numArr[0][1]]) + ' Crore ';
  if (numArr[1]) str += (a[numArr[1]] || b[Math.floor(numArr[1]/10)] + ' ' + a[numArr[1]%10]) + ' Lakh ';
  if (numArr[2]) str += (a[numArr[2]] || b[Math.floor(numArr[2]/10)] + ' ' + a[numArr[2]%10]) + ' Thousand ';
  if (numArr[3]) str += (a[numArr[3]] || b[Math.floor(numArr[3]/10)] + ' ' + a[numArr[3]%10]) + ' ';

  return str.trim() + ' Only';
}
</script>



</body>
