<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Professional Calclulator</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

header {
  background:#1f4e79;
  padding:12px;
  text-align:center;
}

.container {
  display:grid;
  grid-template-columns: 1fr 1.4fr 1fr;
  gap:10px;
  padding:10px;
}

.panel {
  background:#1e293b;
  padding:10px;
  border-radius:10px;
}

label { font-size:12px; color:#cbd5e1; display:block; margin-top:8px; }

input, select {
  width:100%;
  padding:6px;
  margin-top:4px;
  background:#0f172a;
  color:white;
  border:1px solid #334155;
}

canvas {
  width:100%;
  height:520px;
  background:#e2e8f0;
  border-radius:10px;
}
</style>
</head>

<body>

<header>🏗 Aluminium Size Pricing</header>

<div class="container">

<!-- INPUT -->
<div class="panel">

<h3>Inputs</h3>

<label>Width (mm)</label>
<input id="w" value="1200">

<label>Height (mm)</label>
<input id="h" value="1500">

<label>Window Type</label>
<select id="type">
  <option value="Sliding">Sliding</option>
  <option value="Casement">Casement</option>
  <option value="Fixed">Fixed</option>
  <option value="TopHung">Top Hung</option>
</select>

<label>Profile</label>
<select id="profile">
  <option value="70">70mm</option>
  <option value="80">80mm</option>
  <option value="100">100mm</option>
</select>

<label>Glass</label>
<select id="glass">
  <option value="6">6mm</option>
  <option value="8">8mm</option>
  <option value="10">10mm</option>
</select>

<label>Finish</label>
<select id="finish">
  <option value="white">White</option>
  <option value="black">Black</option>
  <option value="wood">Wood</option>
</select>

<label>Hardware</label>
<select id="hardware">
  <option value="standard">Standard</option>
  <option value="premium">Premium</option>
  <option value="multi">Multi</option>
</select>

</div>

<!-- CAD -->
<div class="panel">
<h3>CAD Preview</h3>
<canvas id="cad"></canvas>
</div>

<!-- COST -->
<div class="panel">
<h3>Cost</h3>
<div id="cost"></div>
</div>

</div>

<script>

const canvas = document.getElementById("cad");
const ctx = canvas.getContext("2d");

let rates = {
  aluminium: {70:18.5,80:21,100:25},
  glass: {6:1200,8:1500,10:1800},
  finishMultiplier: {white:1,black:1.1,wood:1.3},
  hardware: {standard:50,premium:120,multi:200}
};

function resize(){
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
}
window.addEventListener("resize", ()=>{resize(); draw();});
resize();

function drawCAD(w,h,type){

  const scale = Math.min(canvas.width/w, canvas.height/h)*0.8;

  const W = w*scale;
  const H = h*scale;

  const x = (canvas.width-W)/2;
  const y = (canvas.height-H)/2;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // glass
  ctx.fillStyle="#cfe8ff";
  ctx.fillRect(x,y,W,H);

  // frame
  ctx.strokeStyle="#1f4e79";
  ctx.lineWidth=5;
  ctx.strokeRect(x,y,W,H);

  ctx.strokeStyle="#333";
  ctx.lineWidth=2;

  // 🪟 WINDOW TYPE LOGIC
  if(type==="Sliding"){
    ctx.beginPath();
    ctx.moveTo(x+W/2,y);
    ctx.lineTo(x+W/2,y+H);
    ctx.stroke();
  }

  if(type==="Casement"){
    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.lineTo(x+W,y+H);
    ctx.stroke();
  }

  if(type==="TopHung"){
    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.lineTo(x+W,y);
    ctx.stroke();
  }

  // Fixed → no partition
}

function costEngine(w,h){

  const type = document.getElementById("type").value;
  const profile = document.getElementById("profile").value;
  const glass = document.getElementById("glass").value;
  const finish = document.getElementById("finish").value;
  const hardware = document.getElementById("hardware").value;

  let perimeter = (w+h)*2/1000;
  let area = (w*h)/1000000;

  let frame = perimeter * rates.aluminium[profile];
  let glassCost = area * rates.glass[glass];

  let finishCost = (frame+glassCost) * rates.finishMultiplier[finish];

  let hardwareCost = rates.hardware[hardware];

  return frame + glassCost + finishCost + hardwareCost;
}

function draw(){

  const w = +document.getElementById("w").value;
  const h = +document.getElementById("h").value;
  const type = document.getElementById("type").value;

  drawCAD(w,h,type);

  let total = costEngine(w,h);

  document.getElementById("cost").innerHTML =
    `<h2>Total: ${total.toFixed(2)}</h2>`;
}

// LIVE UPDATE
document.querySelectorAll("input,select")
.forEach(e=>e.addEventListener("input", draw));

draw();

</script>

</body>
</html>
