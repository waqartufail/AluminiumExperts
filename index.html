<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aluminium Works</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

body { background: #111; }

/* Slider */
.slider {
    position: fixed;
    width: 100%;
    height: 100vh;
    z-index: -1;
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 1s ease-in-out;
}

.slide.active { opacity: 1; }

/* Overlay Text */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    color: #fff;
    background: rgba(0,0,0,0.4);
}

.hero h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

.hero p {
    font-size: 18px;
    margin-bottom: 20px;
}

.hero button {
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: #00c853;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
}

/* Header */
header {
    position: fixed;
    width: 100%;
    top: 0;
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.15);
    border-bottom: 1px solid rgba(255,255,255,0.3);
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
    color: #fff;
}

.logo { font-size: 20px; font-weight: bold; }

nav ul { display: flex; list-style: none; }
nav ul li { margin: 0 15px; cursor: pointer; }

.menu-toggle { display: none; font-size: 24px; cursor: pointer; }

@media(max-width:768px){
    nav ul { display:none; flex-direction:column; position:absolute; top:60px; right:10px; background:rgba(255,255,255,0.2); padding:10px; border-radius:10px; }
    nav ul.active { display:flex; }
    .menu-toggle { display:block; }
}

/* Cards */
.container {
    padding: 40px 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
}

.card {
    height: 250px;
    border-radius: 15px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
}

.card img { width:100%; height:100%; object-fit:cover; }

.card h3 {
    position:absolute;
    bottom:0;
    width:100%;
    color:#fff;
    background:rgba(0,0,0,0.6);
    text-align:center;
    padding:10px;
}

/* WhatsApp Button */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: #fff;
    padding: 15px 18px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    z-index: 1000;
}
</style>
</head>
<body>

<!-- Slider -->
<div class="slider">
    <div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1503387762-592deb58ef4e');"></div>
    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1523413651479-597eb2da0ad6');"></div>
    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1501183638710-841dd1904471');"></div>
</div>

<!-- Header -->
<header>
    <div class="logo">Aluminium Works</div>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <nav>
        <ul id="menu">
            <li onclick="scrollToSection()">Doors</li>
            <li onclick="scrollToSection()">Windows</li>
            <li onclick="scrollToSection()">Partition</li>
            <li onclick="scrollToSection()">Ladder</li>
            <li onclick="scrollToSection()">Death Bed</li>
        </ul>
    </nav>
</header>

<!-- Hero Section -->
<div class="hero">
    <h1>Aluminium Experts</h1>
    <p>Doors | Windows | Partitions | Custom Work</p>
    <button onclick="scrollToSection()">View Work</button>
</div>

<!-- Cards -->
<div class="container" id="cards">
    <div class="card"><img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c"/><h3>Doors</h3></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1598928506311-c55ded91a20c"/><h3>Windows</h3></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2"/><h3>Partition</h3></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1597262975002-c5c3b14bbd62"/><h3>Ladder</h3></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1600566753086-00f18fb6b3ea"/><h3>Death Bed</h3></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1556911220-bff31c812dba"/><h3>Custom Work</h3></div>
</div>

<!-- WhatsApp -->
<div class="whatsapp" onclick="contactWhatsApp()">💬</div>

<script>
function toggleMenu() {
    document.getElementById("menu").classList.toggle("active");
}

function scrollToSection() {
    document.getElementById("cards").scrollIntoView({ behavior: 'smooth' });
}

function contactWhatsApp() {
    window.open('https://wa.me/923000000000', '_blank');
}

// Slider
let slides = document.querySelectorAll('.slide');
let index = 0;
setInterval(() => {
    slides[index].classList.remove('active');
    index = (index + 1) % slides.length;
    slides[index].classList.add('active');
}, 4000);
</script>

</body>
</html>
